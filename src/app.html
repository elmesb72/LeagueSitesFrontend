<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		<link href="//fonts.googleapis.com/css?family=Asap:200,400,700|Asap+Condensed:700|Righteous&display=swap" rel="stylesheet">
		<link href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous" /><!-- https://fontawesome.com/icons?d=listing&m=free -->
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			// Apply saved theme before render to prevent flash
			const t = localStorage.getItem('theme');
			if (t) document.documentElement.setAttribute('data-theme', t);
		</script>
		<div style="display: contents">
			%sveltekit.body%
		</div>
	</body>
</html>
